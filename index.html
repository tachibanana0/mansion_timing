<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>e-Stat 統計表ID探索ツール</title>
<style>
body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 20px; max-width: 1000px; margin: 0 auto; }
h1 { color: #c8a96e; font-size: 1.2em; }
label { display: block; margin-top: 12px; color: #aaa; font-size: 0.85em; }
input, select { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px; width: 100%; box-sizing: border-box; font-family: monospace; }
button { margin-top: 10px; padding: 8px 20px; background: #c8401a; color: white; border: none; cursor: pointer; font-family: monospace; }
button:hover { background: #e05020; }
#result { margin-top: 20px; white-space: pre-wrap; background: #111; border: 1px solid #333; padding: 12px; font-size: 0.82em; max-height: 600px; overflow-y: auto; }
.ok { color: #4caf50; }
.err { color: #f44336; }
.info { color: #64b5f6; }
.section { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
</style>
</head>
<body>
<h1>🔍 e-Stat 統計表ID探索ツール</h1>

<label>APIキー</label>
<input type="password" id="apiKey" placeholder="e-StatアプリケーションID">

<div class="section">
  <b style="color:#c8a96e">① 統計表を検索（キーワード）</b>
  <label>検索キーワード</label>
  <input type="text" id="keyword" value="住宅着工 都道府県" placeholder="例: 地価 都道府県 変動率">
  <label>統計コード（省略可）</label>
  <input type="text" id="statsCode" placeholder="例: 00600120（建築着工）, 00600310（地価公示）">
  <button onclick="searchStats()">統計表を検索</button>
</div>

<div class="section">
  <b style="color:#c8a96e">② 統計表のサンプルデータを確認</b>
  <label>統計表ID (statsDataId)</label>
  <input type="text" id="statsDataId" placeholder="例: 0003119713">
  <label>都道府県コード (1-47)</label>
  <input type="text" id="prefCode" value="04" placeholder="例: 04（宮城）, 27（大阪）">
  <button onclick="inspectTable()">構造を確認</button>
  <button onclick="testPrefFilter()">都道府県フィルタをテスト</button>
</div>

<div id="result">結果がここに表示されます</div>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';
const BASE_STATS_LIST = 'https://api.e-stat.go.jp/rest/3.0/app/json/getStatsList';
const BASE_STATS_DATA = 'https://api.e-stat.go.jp/rest/3.0/app/json/getStatsData';

function log(msg, cls = '') {
  const r = document.getElementById('result');
  r.innerHTML += `<span class="${cls}">${escHtml(msg)}</span>\n`;
  r.scrollTop = r.scrollHeight;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clear() { document.getElementById('result').innerHTML = ''; }

async function apiFetch(url) {
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
    return await res.json();
  } catch (e) {
    // CORSプロキシ経由
    const res2 = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(20000) });
    const w = await res2.json();
    return JSON.parse(w.contents);
  }
}

async function searchStats() {
  clear();
  const apiKey = document.getElementById('apiKey').value.trim();
  const keyword = document.getElementById('keyword').value.trim();
  const statsCode = document.getElementById('statsCode').value.trim();
  if (!apiKey) { log('⚠ APIキーを入力してください', 'err'); return; }

  log(`🔍 「${keyword}」で統計表を検索中...`, 'info');

  const url = new URL(BASE_STATS_LIST);
  url.searchParams.set('appId', apiKey);
  url.searchParams.set('lang', 'J');
  url.searchParams.set('searchWord', keyword);
  url.searchParams.set('searchKind', '1');
  url.searchParams.set('limit', '20');
  if (statsCode) url.searchParams.set('statsCode', statsCode);

  try {
    const json = await apiFetch(url.toString());
    const result = json?.GET_STATS_LIST?.RESULT;
    if (Number(result?.STATUS) !== 0) {
      log(`❌ エラー: ${result?.ERROR_MSG}`, 'err'); return;
    }
    const tables = json?.GET_STATS_LIST?.DATALIST_INF?.TABLE_INF;
    const list = Array.isArray(tables) ? tables : (tables ? [tables] : []);
    log(`✅ ${list.length}件ヒット\n`, 'ok');
    list.forEach(t => {
      const id = t['@id'];
      const name = t.STATISTICS_NAME || '';
      const title = t.TITLE?.['$'] || t.TITLE || '';
      const cycle = t.CYCLE || '';
      const updated = t.UPDATED_DATE || '';
      log(`📋 ID: ${id}`, 'ok');
      log(`   統計名: ${name}`);
      log(`   表題: ${title}`);
      log(`   周期: ${cycle}  更新: ${updated}\n`);
    });
  } catch (e) {
    log(`❌ 取得失敗: ${e.message}`, 'err');
  }
}

async function inspectTable() {
  clear();
  const apiKey = document.getElementById('apiKey').value.trim();
  const statsId = document.getElementById('statsDataId').value.trim();
  if (!apiKey || !statsId) { log('⚠ APIキーと統計表IDを入力してください', 'err'); return; }

  log(`🔬 ${statsId} の構造を確認中...`, 'info');

  const url = new URL(BASE_STATS_DATA);
  url.searchParams.set('appId', apiKey);
  url.searchParams.set('statsDataId', statsId);
  url.searchParams.set('metaGetFlg', 'N');
  url.searchParams.set('cntGetFlg', 'Y');
  url.searchParams.set('limit', '5');

  try {
    const json = await apiFetch(url.toString());
    const result = json?.GET_STATS_DATA?.RESULT;
    if (Number(result?.STATUS) !== 0) {
      log(`❌ STATUS=${result?.STATUS}: ${result?.ERROR_MSG}`, 'err'); return;
    }
    const total = json?.GET_STATS_DATA?.STATISTICAL_DATA?.RESULT_INF?.TOTAL_NUMBER;
    log(`✅ 総件数: ${total}件\n`, 'ok');

    const values = json?.GET_STATS_DATA?.STATISTICAL_DATA?.DATA_INF?.VALUE;
    const list = Array.isArray(values) ? values : (values ? [values] : []);
    if (list.length > 0) {
      log('── サンプルデータ（最大5件） ──', 'info');
      list.forEach((v, i) => log(`[${i}] ${JSON.stringify(v)}`));
      log('\n── 各属性の一意な値 ──', 'info');
      const keys = Object.keys(list[0]).filter(k => k !== '$' && k !== '@unit');
      keys.forEach(k => {
        const vals = [...new Set(list.map(v => v[k]))];
        log(`  ${k}: ${JSON.stringify(vals)}`);
      });
    }
    log('\n💡 都道府県がどの属性に入っているかをチェックし、② でテストしてください', 'info');
  } catch (e) {
    log(`❌ 取得失敗: ${e.message}`, 'err');
  }
}

async function testPrefFilter() {
  clear();
  const apiKey = document.getElementById('apiKey').value.trim();
  const statsId = document.getElementById('statsDataId').value.trim();
  const prefCode = document.getElementById('prefCode').value.trim().padStart(2,'0');
  if (!apiKey || !statsId) { log('⚠ APIキーと統計表IDを入力してください', 'err'); return; }

  log(`🧪 ${statsId} で都道府県コード ${prefCode} のフィルタをテスト中...`, 'info');

  // 試すコードパターン
  const patterns = {
    'cdArea (XX000)': prefCode + '000',
    '@cat01': prefCode,
    '@cat02 (000PPOO 8桁)': '00000' + prefCode + '00',
    '@cat03': prefCode,
    '@tab': prefCode,
  };

  for (const [label, code] of Object.entries(patterns)) {
    // まず全件からサンプルを取って該当するか確認
  }

  // 全件100件取得してどの属性に都道府県コードが入るか確認
  const url = new URL(BASE_STATS_DATA);
  url.searchParams.set('appId', apiKey);
  url.searchParams.set('statsDataId', statsId);
  url.searchParams.set('metaGetFlg', 'N');
  url.searchParams.set('cntGetFlg', 'N');
  url.searchParams.set('limit', '100');

  try {
    const json = await apiFetch(url.toString());
    const result = json?.GET_STATS_DATA?.RESULT;
    if (Number(result?.STATUS) !== 0) {
      log(`❌ STATUS=${result?.STATUS}: ${result?.ERROR_MSG}`, 'err'); return;
    }
    const values = json?.GET_STATS_DATA?.STATISTICAL_DATA?.DATA_INF?.VALUE;
    const list = Array.isArray(values) ? values : (values ? [values] : []);

    log(`取得件数: ${list.length}件\n`, 'ok');

    // 各属性でprefCodeと一致するものを探す
    const p2 = prefCode;
    const p5 = prefCode + '000';
    const p8 = '00000' + prefCode + '00';

    const keys = list.length > 0 ? Object.keys(list[0]).filter(k => k !== '$') : [];
    log('── 都道府県コード検索結果 ──', 'info');
    let found = false;
    keys.forEach(k => {
      const allVals = [...new Set(list.map(v => v[k]))];
      [p2, p5, p8].forEach(code => {
        if (allVals.includes(code)) {
          log(`✅ ${k}="${code}" にヒット！ → cdパラメータ: cd${k.replace('@','').replace(/^./,c=>c.toUpperCase())}="${code}"`, 'ok');
          found = true;
        }
      });
    });
    if (!found) {
      log('⚠ 最初の100件に都道府県コードが見つかりませんでした', 'err');
      log('── 全属性値（各最大10件） ──', 'info');
      keys.forEach(k => {
        const allVals = [...new Set(list.map(v => v[k]))].slice(0,10);
        log(`  ${k}: ${JSON.stringify(allVals)}`);
      });
      log('\n💡 ページングが必要か、別の統計表IDを試してください', 'info');
    }
  } catch (e) {
    log(`❌ 取得失敗: ${e.message}`, 'err');
  }
}
</script>
</body>
</html>

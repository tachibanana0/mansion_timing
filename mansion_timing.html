<!DOCTYPE html>
<!-- (HTMLの他の部分は変更なし) -->

    <script>
        // (JavaScriptの他の部分も変更なし)

        // ==========================================
        // 国土交通省 Webland API (APIキー不要)
        // ==========================================
        async function fetchRealEstateData(prefCode) {
            // 直近の四半期データを取得 (2024年第3四半期を指定。本来は動的に最新期を指定します)
            const period = "20243"; 
            
            // ★★★★★ ここからが変更点 ★★★★★

            // 1. 本来のリクエスト先URLを定義
            const targetUrl = `https://www.land.mlit.go.jp/webland/api/TradeListSearch?from=${period}&to=${period}&area=${prefCode}`;

            // 2. 無料のCORSプロキシサーバーを挟んだURLを生成
            const url = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            // ★★★★★ ここまでが変更点 ★★★★★

            const response = await fetch(url);
            if (!response.ok) throw new Error('国交省APIの通信に失敗しました');
            const json = await response.json();

            // (これ以降の処理は変更なし)
            
            if (json.status !== "OK") {
                 // corsproxy.io経由の場合、エラー詳細が本体に含まれることがある
                 if(json.contents) {
                     const originalJson = JSON.parse(json.contents);
                     if(originalJson.status !== "OK") {
                        throw new Error('国交省APIから正常なデータが返却されませんでした');
                     }
                     // エラーでなければ、以降の処理のためにデータを差し替える
                     json.data = originalJson.data;
                 } else {
                    throw new Error('国交省APIから正常なデータが返却されませんでした');
                 }
            }

            const mansions = json.data.filter(item => item.Type === "中古マンション等");
            const tradeCount = mansions.length;

            let avgUnitPrice = 0;
            if (tradeCount > 0) {
                const validPrices = mansions.filter(m => m.UnitPrice).map(m => parseInt(m.UnitPrice, 10)); // 数値に変換
                if (validPrices.length > 0) {
                    const sum = validPrices.reduce((a, b) => a + b, 0);
                    avgUnitPrice = sum / validPrices.length;
                }
            }

            const unitPriceManYen = avgUnitPrice / 10000;
            const tsuboPriceManYen = unitPriceManYen * 3.3;

            return {
                tradeCount: tradeCount,
                unitPriceManYen: unitPriceManYen.toFixed(1),
                tsuboPriceManYen: tsuboPriceManYen.toFixed(1)
            };
        }

        // (他のJavaScript関数は変更なし)
    </script>
</body>
</html>
